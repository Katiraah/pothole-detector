<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pothole Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#111; color:#eee; font-family:sans-serif; text-align:center; padding:16px; }
    h2 { margin:12px 0; font-size:1.3em; }
    video { width:100%; max-width:480px; border-radius:12px; margin:10px 0; border:2px solid #333; }
    canvas { display:none; }
    .info { font-size:.9em; color:#aaa; margin:6px 0; min-height:1.2em; }
    #count { font-size:1.5em; color:#f90; margin:12px 0; font-weight:bold; }
    #status { margin:8px 0; font-size:1em; }
    button { padding:12px 28px; margin:6px; border-radius:8px; border:none; font-size:1em; cursor:pointer; background:#e63; color:#fff; }
    button.stop { background:#555; }
  </style>
</head>
<body>
  <h2>🕳️ Pothole Detector</h2>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="info" id="gps"> GPS: acquiring...</div>
  <div id="status"> Not started</div>
  <div id="count">Potholes logged: 0</div>
  <div>
    <button onclick="startDetection()"> Start</button>
    <button class="stop" onclick="stopDetection()"> Stop</button>
  </div>

<script>
  const WS_URL = "wss://enable-district-marbles.ngrok-free.dev";
  const FPS    = 5;

  let ws, stream, timer;
  let currentLat = null, currentLon = null;
  let totalLogged = 0;

  navigator.geolocation.watchPosition(
    pos => {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      const acc  = pos.coords.accuracy.toFixed(0);
      document.getElementById("gps").textContent =
        `📍 ${currentLat.toFixed(6)}, ${currentLon.toFixed(6)}  (±${acc}m)`;
    },
    err => {
      document.getElementById("gps").textContent = " GPS error: " + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
  );

  async function startDetection() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: 640, height: 480 },
        audio: false
      });
      document.getElementById("video").srcObject = stream;
      document.getElementById("status").textContent = "Camera on — connecting to Colab...";

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        document.getElementById("status").textContent = " Connected to Colab — detecting...";
        const video  = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx    = canvas.getContext("2d");
        canvas.width  = 320;
        canvas.height = 240;

        timer = setInterval(() => {
          if (ws.readyState !== WebSocket.OPEN) return;
          ctx.drawImage(video, 0, 0, 320, 240);
          const b64 = canvas.toDataURL("image/jpeg", 0.65).split(",")[1];
          ws.send(JSON.stringify({ frame: b64, lat: currentLat, lon: currentLon }));
        }, 1000 / FPS);
      };

      ws.onmessage = e => {
        const res = JSON.parse(e.data);
        if (res.potholes > 0) {
          totalLogged += res.potholes;
          document.getElementById("count").textContent = ` Potholes logged: ${totalLogged}`;
          document.getElementById("status").textContent = ` Pothole detected! Total: ${totalLogged}`;
        }
        if (res.error === "no_gps") {
          document.getElementById("status").textContent = " Waiting for GPS fix...";
        }
      };

      ws.onerror = () => {
        document.getElementById("status").textContent = " Connection failed — check ngrok URL";
      };

      ws.onclose = () => {
        document.getElementById("status").textContent = " Disconnected from Colab";
        clearInterval(timer);
      };

    } catch (err) {
      document.getElementById("status").textContent = " Camera error: " + err.message;
    }
  }

  function stopDetection() {
    clearInterval(timer);
    if (ws)     ws.close();
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById("status").textContent = " Stopped";
    document.getElementById("video").srcObject = null;
  }
</script>
</body>
</html>
